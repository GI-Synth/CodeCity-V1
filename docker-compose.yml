version: "3.9"

services:
  software-city:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - city-data:/app/artifacts/api-server/data
    environment:
      - NODE_ENV=production
      - PORT=8080
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  city-data:
